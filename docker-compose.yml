version: '3.8'

services:
  # Serviço do Banco de Dados
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-livros
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD}" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Serviço da sua API
  gerenciador-api:
    image: gerenciador-livros-api
    container_name: api-livros
    build:
      context: .
      dockerfile: src/GerenciadorLivros.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - DB_SERVER=${DB_SERVER}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      sql-server:
        condition: service_healthy

volumes:
  sql_data:
