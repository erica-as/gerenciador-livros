name: Commitlint

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  commitlint:
    name: Validar mensagens de commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Instalar dependências
        run: npm ci

      - name: Validar commits (pull_request)
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to HEAD --verbose --exclude-merge

